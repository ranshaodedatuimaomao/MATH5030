[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "bsde-cfft-sv"
version = "0.0.0"
description = "MATH5030 final project: BSDE-CFFT layout with course console tools and implementation_version_0 core."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "UNLICENSED" }
authors = [{ name = "qingp" }]
dependencies = []

[project.optional-dependencies]
test = ["pytest>=8.0"]
plot = ["matplotlib>=3.8"]

[project.scripts]
bsde-cfft-sv = "bsde_cfft_sv.cli:main"

[tool.setuptools]
package-dir = { "" = "src" }

[tool.setuptools.packages.find]
where = ["src"]
include = ["bsde_cfft_sv*"]
