name: CI
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Editable install
        run: pip install -e .
      - name: Import check
        run: python -c "import bsde_cfft_sv; assert bsde_cfft_sv.__version__"
      - name: Build sdist and wheel
        run: |
          pip install build
          python -m build
